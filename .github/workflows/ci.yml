name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22.12.0
          cache: npm

      - name: Verify lockfile sync
        run: npm install --package-lock-only --dry-run --ignore-scripts

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Run ESLint
        run: npm run lint

  type-check:
    name: TypeScript Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22.12.0
          cache: npm

      - name: Verify lockfile sync
        run: npm install --package-lock-only --dry-run --ignore-scripts
      - name: Install dependencies
        run: npm ci --no-audit --no-fund
      - name: TypeScript validation
        run: npm run type-check

  unit-tests:
    name: Unit Tests (Vitest)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22.12.0
          cache: npm

      - name: Verify lockfile sync
        run: npm install --package-lock-only --dry-run --ignore-scripts
      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Run unit tests
        run: npm run test:ci

  design-system-audit:
    name: Design System Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22.12.0
          cache: npm

      - name: Verify lockfile sync
        run: npm install --package-lock-only --dry-run --ignore-scripts

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Run design system audit
        run: npm run design-system:audit
