name: Deploy Vercel

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.12.0
          cache: npm

      - name: Verify lockfile sync
        run: npm install --package-lock-only --dry-run --ignore-scripts

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Skip when Vercel secrets are missing
        if: ${{ !env.VERCEL_ORG_ID || !env.VERCEL_PROJECT_ID || !env.VERCEL_TOKEN }}
        run: echo 'Vercel secrets are not configured yet. Skipping deployment.'

      - name: Install Vercel CLI
        if: ${{ env.VERCEL_ORG_ID && env.VERCEL_PROJECT_ID && env.VERCEL_TOKEN }}
        run: npm install --global vercel@latest

      - name: Pull Vercel environment
        if: ${{ env.VERCEL_ORG_ID && env.VERCEL_PROJECT_ID && env.VERCEL_TOKEN }}
        run: vercel pull --yes --environment=${{ github.event_name == 'push' && 'production' || 'preview' }} --token=${{ env.VERCEL_TOKEN }}

      - name: Build deployment bundle
        if: ${{ env.VERCEL_ORG_ID && env.VERCEL_PROJECT_ID && env.VERCEL_TOKEN }}
        run: vercel build --token=${{ env.VERCEL_TOKEN }}

      - name: Deploy preview
        if: ${{ github.event_name == 'pull_request' && env.VERCEL_ORG_ID && env.VERCEL_PROJECT_ID && env.VERCEL_TOKEN }}
        run: vercel deploy --prebuilt --token=${{ env.VERCEL_TOKEN }}

      - name: Deploy production
        if: ${{ github.event_name == 'push' && env.VERCEL_ORG_ID && env.VERCEL_PROJECT_ID && env.VERCEL_TOKEN }}
        run: vercel deploy --prebuilt --prod --token=${{ env.VERCEL_TOKEN }}
