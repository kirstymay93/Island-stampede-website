python3 - <<'PY'
from pathlib import Path

p = Path(".github/workflows/build.yml")

if not p.exists():
    raise SystemExit("❌ build.yml not found")

text = p.read_text()

text = text.replace(
    "cache-dependency-path: frontend/yarn.lock",
    "cache-dependency-path: frontend/package.json"
)

p.write_text(text)

print("✅ Updated GitHub Actions cache path")
PY

git add .github/workflows/build.yml
git commit -m "Fix GitHub Actions yarn cache path"
git push origin website-clone