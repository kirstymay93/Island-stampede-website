name: Type Check

on:
  pull_request:
  push:
    branches:
      - main
      - 'copilot/**'

jobs:
  type-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: TypeScript validation
        run: npm run type-check

      - name: Production build
        run: npm run build
